# ============================================================
# secret.yaml
# Stores SENSITIVE values like passwords.
# Values MUST be base64-encoded (Kubernetes requires this).
# HOW TO ENCODE: echo -n "your-value" | base64
#
# DB_USERNAME = "root"      → cm9vdA==
# DB_PASSWORD = "rps@12345" → cnBzQDEyMzQ1
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: helpdesk-secrets      # Name used to reference this Secret
  namespace: default
  labels:
    app: helpdesk
type: Opaque                   # 'Opaque' = generic secret (most common type)
data:
  # base64 encoded value of "root"
  DB_USERNAME: cm9vdA==

  # base64 encoded value of "rps@12345"
  DB_PASSWORD: cnBzQDEyMzQ1
