<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Add User | HelpDesk Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <th:block th:replace="~{fragments/layout :: globalStyles}"></th:block>
</head>
<body>
<div class="d-flex">
  <th:block th:replace="~{fragments/layout :: sidebar}"></th:block>
  <div id="main-content" class="flex-grow-1">
    <div class="topbar">
      <h1 class="topbar-title"><i class="fas fa-user-plus me-2 text-primary"></i>Add User</h1>
      <a th:href="@{/admin/users}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i>Back
      </a>
    </div>
    <div class="content-area">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header"><i class="fas fa-user-plus me-2 text-primary"></i>Create New User</div>
            <div class="card-body p-4">
              <form th:action="@{/admin/users/save}" method="post">
                <div class="mb-3">
                  <label class="form-label">Full Name <span class="text-danger">*</span></label>
                  <input type="text" name="name" class="form-control" placeholder="John Doe" required/>
                </div>
                <div class="mb-3">
                  <label class="form-label">Email Address <span class="text-danger">*</span></label>
                  <input type="email" name="email" class="form-control" placeholder="john@example.com" required/>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password <span class="text-danger">*</span></label>
                  <div class="input-group">
                    <input type="password" id="pwdInput" name="password" class="form-control"
                           placeholder="Min 6 characters" required minlength="6"/>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()">
                      <i class="fas fa-eye" id="pwdIcon"></i>
                    </button>
                  </div>
                </div>
                <div class="mb-4">
                  <label class="form-label">Role <span class="text-danger">*</span></label>
                  <select name="role" class="form-select" required>
                    <option value="">-- Select Role --</option>
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                  </select>
                  <div class="mt-2 p-2 rounded" style="background:#f8f9fc;font-size:.8rem;">
                    <div><span class="badge badge-role-admin me-1">ADMIN</span> Full system access</div>
                    <div class="mt-1"><span class="badge badge-role-agent me-1">AGENT</span> Can handle & resolve tickets</div>
                    <div class="mt-1"><span class="badge badge-role-end_user me-1">END_USER</span> Can submit tickets only</div>
                  </div>
                </div>
                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-primary px-4">
                    <i class="fas fa-user-plus me-2"></i>Create User
                  </button>
                  <a th:href="@{/admin/users}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePwd() {
    const i = document.getElementById('pwdInput');
    const icon = document.getElementById('pwdIcon');
    if (i.type === 'password') { i.type = 'text'; icon.className = 'fas fa-eye-slash'; }
    else { i.type = 'password'; icon.className = 'fas fa-eye'; }
  }
</script>
</body>
</html>
