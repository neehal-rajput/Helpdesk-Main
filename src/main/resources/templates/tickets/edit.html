<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Edit Ticket | HelpDesk Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <th:block th:replace="~{fragments/layout :: globalStyles}"></th:block>
</head>
<body>
<div class="d-flex">
  <th:block th:replace="~{fragments/layout :: sidebar}"></th:block>
  <div id="main-content" class="flex-grow-1">
    <div class="topbar">
      <h1 class="topbar-title"><i class="fas fa-edit me-2 text-primary"></i>Edit Ticket</h1>
      <a th:href="@{/tickets/{id}(id=${ticketId})}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i>Back
      </a>
    </div>
    <div class="content-area">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-header"><i class="fas fa-edit me-2 text-primary"></i>Update Ticket Details</div>
            <div class="card-body p-4">
              <form th:action="@{/tickets/{id}/update(id=${ticketId})}" method="post">
                <div class="mb-3">
                  <label class="form-label">Title <span class="text-danger">*</span></label>
                  <input type="text" name="title" class="form-control"
                         th:value="${ticketDto.title}" required maxlength="200"/>
                </div>
                <div class="mb-3">
                  <label class="form-label">Description <span class="text-danger">*</span></label>
                  <textarea name="description" class="form-control" rows="5"
                            required th:text="${ticketDto.description}"></textarea>
                </div>
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Priority <span class="text-danger">*</span></label>
                    <select name="priority" class="form-select" required>
                      <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"
                              th:selected="${p == ticketDto.priority}"></option>
                    </select>
                  </div>
                  <div class="col-md-6 mb-3" th:if="${isAdmin}">
                    <label class="form-label">User</label>
                    <select name="userId" class="form-select">
                      <option th:each="u : ${users}" th:value="${u.userId}"
                              th:text="${u.name + ' (' + u.email + ')'}"
                              th:selected="${u.userId == ticketDto.userId}"></option>
                    </select>
                  </div>
                  <input th:unless="${isAdmin}" type="hidden" name="userId" th:value="${ticketDto.userId}"/>
                </div>
                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-primary px-4">
                    <i class="fas fa-save me-2"></i>Save Changes
                  </button>
                  <a th:href="@{/tickets/{id}(id=${ticketId})}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
