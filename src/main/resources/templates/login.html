<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login | HelpDesk Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body {
      min-height: 100vh; margin: 0;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-wrapper { width: 100%; max-width: 440px; padding: 1rem; }
    .login-card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,.3); overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 2rem; text-align: center; color: #fff;
    }
    .brand-icon {
      width: 64px; height: 64px; background: rgba(255,255,255,.2);
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem; font-size: 1.75rem;
    }
    .login-header h2 { font-weight: 700; margin: 0; font-size: 1.5rem; }
    .login-header p { margin: .25rem 0 0; opacity: .85; font-size: .875rem; }
    .login-body { padding: 2rem; }
    .form-control {
      border-radius: 10px; border: 1.5px solid #e5e7eb;
      padding: .7rem 1rem .7rem 2.75rem; font-size: .9rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); outline: none; }
    .input-icon { position: relative; }
    .input-icon i { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: .875rem; }
    .btn-login {
      width: 100%; padding: .8rem; border-radius: 10px; font-weight: 600;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none; color: #fff; font-size: .95rem;
      transition: opacity .2s, transform .1s;
    }
    .btn-login:hover { opacity: .92; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .divider { text-align: center; margin: 1.25rem 0; color: #9ca3af; font-size: .8rem; position: relative; }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: #e5e7eb;
    }
    .divider::before { left: 0; } .divider::after { right: 0; }
    .demo-creds { background: #f8f9fc; border-radius: 12px; padding: 1rem; margin-top: 1.25rem; }
    .demo-creds h6 { font-size: .75rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .75rem; }
    .cred-item { display: flex; align-items: center; gap: .6rem; margin-bottom: .5rem; cursor: pointer; }
    .cred-item:last-child { margin-bottom: 0; }
    .cred-badge {
      font-size: .65rem; font-weight: 600; padding: .2rem .5rem; border-radius: 20px;
      white-space: nowrap; min-width: 60px; text-align: center;
    }
    .badge-admin { background: #ede9fe; color: #5b21b6; }
    .badge-agent { background: #dbeafe; color: #1e40af; }
    .badge-user { background: #d1fae5; color: #065f46; }
    .cred-text { font-size: .78rem; color: #374151; }
    .alert { border-radius: 10px; font-size: .875rem; }
    .form-label { font-weight: 500; font-size: .875rem; color: #374151; margin-bottom: .4rem; }
    .footer-text { text-align: center; margin-top: 1.25rem; font-size: .8rem; color: #9ca3af; }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="brand-icon"><i class="fas fa-headset"></i></div>
      <h2>HelpDesk Pro</h2>
      <p>Sign in to your account</p>
    </div>
    <div class="login-body">

      <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${errorMsg}"></span>
      </div>
      <div th:if="${logoutMsg}" class="alert alert-success d-flex align-items-center gap-2 py-2" role="alert">
        <i class="fas fa-check-circle"></i>
        <span th:text="${logoutMsg}"></span>
      </div>

      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" class="form-control"
                   placeholder="Enter your email" required autofocus/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" class="form-control"
                   placeholder="Enter your password" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-login">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
      </form>

      <div class="divider">Demo Credentials</div>

      <div class="demo-creds">
        <h6>Click to auto-fill</h6>
        <div class="cred-item" onclick="fillCreds('admin@helpdesk.com','admin123')">
          <span class="cred-badge badge-admin">ADMIN</span>
          <span class="cred-text">admin@helpdesk.com / admin123</span>
        </div>
        <div class="cred-item" onclick="fillCreds('agent@helpdesk.com','agent123')">
          <span class="cred-badge badge-agent">AGENT</span>
          <span class="cred-text">agent@helpdesk.com / agent123</span>
        </div>
        <div class="cred-item" onclick="fillCreds('user@helpdesk.com','user123')">
          <span class="cred-badge badge-user">USER</span>
          <span class="cred-text">user@helpdesk.com / user123</span>
        </div>
      </div>

      <div class="footer-text">HelpDesk Pro v1.0 &bull; Secured by Spring Security</div>
    </div>
  </div>
</div>
<script>
  function fillCreds(email, pass) {
    document.querySelector('input[name="email"]').value = email;
    document.querySelector('input[name="password"]').value = pass;
  }
</script>
</body>
</html>
