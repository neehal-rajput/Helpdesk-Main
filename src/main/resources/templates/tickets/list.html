<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Tickets | HelpDesk Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <th:block th:replace="~{fragments/layout :: globalStyles}"></th:block>
</head>
<body>
<div class="d-flex">
  <th:block th:replace="~{fragments/layout :: sidebar}"></th:block>
  <div id="main-content" class="flex-grow-1">
    <div class="topbar">
      <h1 class="topbar-title"><i class="fas fa-ticket-alt me-2 text-primary"></i>Tickets</h1>
      <a th:href="@{/tickets/new}" class="btn btn-primary btn-sm">
        <i class="fas fa-plus me-1"></i>New Ticket
      </a>
    </div>
    <div class="content-area">
      <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Filter bar -->
      <div class="card mb-3">
        <div class="card-body py-2">
          <div class="row g-2 align-items-center">
            <div class="col-md-4">
              <div class="input-group input-group-sm">
                <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                <input type="text" id="searchInput" class="form-control" placeholder="Search tickets..."/>
              </div>
            </div>
            <div class="col-auto">
              <select id="statusFilter" class="form-select form-select-sm">
                <option value="">All Status</option>
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
              </select>
            </div>
            <div class="col-auto">
              <select id="priorityFilter" class="form-select form-select-sm">
                <option value="">All Priority</option>
                <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
              </select>
            </div>
            <div class="col-auto ms-auto">
              <span class="text-muted small" id="resultCount"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <div th:if="${#lists.isEmpty(tickets)}" class="empty-state">
            <i class="fas fa-inbox"></i>
            <p class="fw-500 mb-2">No tickets found</p>
            <a th:href="@{/tickets/new}" class="btn btn-primary btn-sm">Create Ticket</a>
          </div>
          <div class="table-responsive" th:if="${not #lists.isEmpty(tickets)}">
            <table class="table table-hover mb-0" id="ticketsTable">
              <thead class="table-light">
                <tr>
                  <th class="ps-3" style="width:60px">#ID</th>
                  <th>Title</th>
                  <th>Priority</th>
                  <th>Status</th>
                  <th>Submitted By</th>
                  <th>Created</th>
                  <th style="width:100px">Actions</th>
                </tr>
              </thead>
              <tbody id="ticketRows">
                <tr th:each="ticket : ${tickets}"
                    th:data-title="${#strings.toLowerCase(ticket.title)}"
                    th:data-status="${ticket.status}"
                    th:data-priority="${ticket.priority}">
                  <td class="ps-3">
                    <span class="fw-600 text-primary" th:text="'#' + ${ticket.ticketId}">#1</span>
                  </td>
                  <td>
                    <a th:href="@{/tickets/{id}(id=${ticket.ticketId})}"
                       class="text-decoration-none text-dark fw-500"
                       th:text="${#strings.abbreviate(ticket.title, 50)}">Title</a>
                    <div class="text-muted small" th:text="${#strings.abbreviate(ticket.description, 60)}"></div>
                  </td>
                  <td>
                    <span class="badge rounded-pill px-2 py-1"
                          th:classappend="'badge-priority-' + ${#strings.toLowerCase(ticket.priority)}"
                          th:text="${ticket.priority}">MEDIUM</span>
                  </td>
                  <td>
                    <span class="badge rounded-pill px-2 py-1"
                          th:classappend="'badge-status-' + ${#strings.toLowerCase(ticket.status)}"
                          th:text="${#strings.replace(ticket.status.toString(), '_', ' ')}">OPEN</span>
                  </td>
                  <td>
                    <div class="d-flex align-items-center gap-2">
                      <div class="avatar" style="width:28px;height:28px;font-size:.7rem;background:#e0e7ff;color:#4f46e5;"
                           th:text="${#strings.substring(ticket.user?.name ?: 'U', 0, 1).toUpperCase()}">U</div>
                      <span th:text="${ticket.user?.name ?: 'N/A'}"></span>
                    </div>
                  </td>
                  <td th:text="${#temporals.format(ticket.createdDate, 'dd MMM yy')}">01 Jan 24</td>
                  <td>
                    <div class="d-flex gap-1">
                      <a th:href="@{/tickets/{id}(id=${ticket.ticketId})}"
                         class="btn btn-sm btn-outline-primary" title="View">
                        <i class="fas fa-eye"></i>
                      </a>
                      <a th:href="@{/tickets/{id}/edit(id=${ticket.ticketId})}"
                         class="btn btn-sm btn-outline-secondary" title="Edit"
                         sec:authorize="hasAnyRole('ADMIN','AGENT')">
                        <i class="fas fa-edit"></i>
                      </a>
                      <form th:action="@{/tickets/{id}/delete(id=${ticket.ticketId})}" method="post"
                            onsubmit="return confirm('Delete this ticket?')"
                            sec:authorize="hasRole('ADMIN')">
                        <button class="btn btn-sm btn-outline-danger" title="Delete">
                          <i class="fas fa-trash"></i>
                        </button>
                      </form>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function filterTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('statusFilter').value.toLowerCase();
    const priority = document.getElementById('priorityFilter').value.toLowerCase();
    const rows = document.querySelectorAll('#ticketRows tr');
    let count = 0;
    rows.forEach(row => {
      const title = row.dataset.title || '';
      const rowStatus = (row.dataset.status || '').toLowerCase();
      const rowPriority = (row.dataset.priority || '').toLowerCase();
      const show = title.includes(search)
        && (status === '' || rowStatus === status)
        && (priority === '' || rowPriority === priority);
      row.style.display = show ? '' : 'none';
      if (show) count++;
    });
    const el = document.getElementById('resultCount');
    if (el) el.textContent = count + ' ticket' + (count !== 1 ? 's' : '');
  }
  document.getElementById('searchInput').addEventListener('input', filterTable);
  document.getElementById('statusFilter').addEventListener('change', filterTable);
  document.getElementById('priorityFilter').addEventListener('change', filterTable);
  filterTable();
  setTimeout(() => { document.querySelectorAll('.alert-dismissible').forEach(a => { try { bootstrap.Alert.getOrCreateInstance(a).close(); } catch(e){} }); }, 4000);
</script>
</body>
</html>
