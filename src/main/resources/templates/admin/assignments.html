<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Assignments | HelpDesk Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <th:block th:replace="~{fragments/layout :: globalStyles}"></th:block>
</head>
<body>
<div class="d-flex">
  <th:block th:replace="~{fragments/layout :: sidebar}"></th:block>
  <div id="main-content" class="flex-grow-1">
    <div class="topbar">
      <h1 class="topbar-title"><i class="fas fa-user-tag me-2 text-primary"></i>Assignments</h1>
      <a th:href="@{/tickets}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-ticket-alt me-1"></i>View Tickets
      </a>
    </div>
    <div class="content-area">
      <div class="card">
        <div class="card-header d-flex justify-content-between">
          <span><i class="fas fa-user-tag me-2 text-primary"></i>All Assignments (<span th:text="${#lists.size(assignments)}">0</span>)</span>
        </div>
        <div class="card-body p-0">
          <div th:if="${#lists.isEmpty(assignments)}" class="empty-state">
            <i class="fas fa-user-tag"></i>
            <p>No assignments yet.</p>
            <p class="small text-muted">Assign tickets to agents from the ticket detail page.</p>
          </div>
          <div class="table-responsive" th:if="${not #lists.isEmpty(assignments)}">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th class="ps-3">#ID</th>
                  <th>Ticket</th>
                  <th>Ticket Status</th>
                  <th>Assigned To</th>
                  <th>Agent Email</th>
                  <th>Assigned Date</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="a : ${assignments}">
                  <td class="ps-3 fw-600 text-primary" th:text="${a.assignmentId}">1</td>
                  <td>
                    <a th:href="@{/tickets/{id}(id=${a.ticket?.ticketId})}"
                       class="text-decoration-none fw-500"
                       th:text="${#strings.abbreviate(a.ticket?.title ?: 'N/A', 45)}">Ticket</a>
                  </td>
                  <td>
                    <span class="badge rounded-pill"
                          th:if="${a.ticket?.status != null}"
                          th:classappend="'badge-status-' + ${#strings.toLowerCase(a.ticket.status)}"
                          th:text="${#strings.replace(a.ticket.status.toString(),'_',' ')}">STATUS</span>
                  </td>
                  <td>
                    <div class="d-flex align-items-center gap-2">
                      <div class="avatar" style="width:28px;height:28px;font-size:.7rem;background:#e0e7ff;color:#4f46e5;"
                           th:text="${#strings.substring(a.assignedTo?.name ?: 'A', 0, 1).toUpperCase()}">A</div>
                      <span th:text="${a.assignedTo?.name ?: 'N/A'}"></span>
                    </div>
                  </td>
                  <td class="text-muted small" th:text="${a.assignedTo?.email ?: 'N/A'}">email</td>
                  <td th:text="${#temporals.format(a.assignedDate, 'dd MMM yyyy HH:mm')}">Date</td>
                  <td>
                    <a th:href="@{/tickets/{id}(id=${a.ticket?.ticketId})}"
                       class="btn btn-sm btn-outline-primary">
                      <i class="fas fa-eye me-1"></i>View
                    </a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
