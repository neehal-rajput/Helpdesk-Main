<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle} + ' | HelpDesk Pro'">HelpDesk Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style th:fragment="globalStyles">
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --sidebar-bg: #1e1b4b;
      --sidebar-text: #c7d2fe;
      --sidebar-hover: #312e81;
      --sidebar-active: #4f46e5;
      --card-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    * { font-family: 'Inter', sans-serif; }
    body { background: #f8f9fc; min-height: 100vh; }

    /* Sidebar */
    #sidebar {
      width: 260px; min-height: 100vh; background: var(--sidebar-bg);
      position: fixed; top: 0; left: 0; z-index: 1000;
      display: flex; flex-direction: column;
      transition: transform .3s ease;
    }
    .sidebar-brand {
      padding: 1.5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-brand h5 { color: #fff; font-weight: 700; margin: 0; font-size: 1.1rem; }
    .sidebar-brand small { color: var(--sidebar-text); font-size: .7rem; letter-spacing: .05em; text-transform: uppercase; }
    .sidebar-nav { padding: 1rem 0; flex: 1; overflow-y: auto; }
    .nav-section-title {
      color: rgba(199,210,254,.4); font-size: .65rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .1em;
      padding: .5rem 1.25rem .25rem;
    }
    .sidebar-nav .nav-link {
      color: var(--sidebar-text); padding: .6rem 1.25rem;
      border-radius: 6px; margin: 1px .5rem; display: flex; align-items: center; gap: .7rem;
      font-size: .875rem; font-weight: 500; transition: all .2s;
    }
    .sidebar-nav .nav-link:hover { background: var(--sidebar-hover); color: #fff; }
    .sidebar-nav .nav-link.active { background: var(--sidebar-active); color: #fff; }
    .sidebar-nav .nav-link i { width: 18px; text-align: center; font-size: .875rem; }
    .sidebar-footer {
      padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,.08);
    }
    .user-card { display: flex; align-items: center; gap: .75rem; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 600; font-size: .875rem; flex-shrink: 0;
    }
    .user-info .name { color: #fff; font-size: .8rem; font-weight: 600; line-height: 1.2; }
    .user-info .role { color: var(--sidebar-text); font-size: .7rem; }

    /* Main content */
    #main-content { margin-left: 260px; min-height: 100vh; }
    .topbar {
      background: #fff; border-bottom: 1px solid #e5e7eb;
      padding: .75rem 1.5rem; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 999;
    }
    .topbar-title { font-size: 1rem; font-weight: 600; color: #111827; margin: 0; }
    .content-area { padding: 1.5rem; }

    /* Cards */
    .card { border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: var(--card-shadow); }
    .card-header { background: #fff; border-bottom: 1px solid #f3f4f6; font-weight: 600; padding: 1rem 1.25rem; }

    /* Stats cards */
    .stat-card { border-radius: 12px; padding: 1.25rem; color: #fff; position: relative; overflow: hidden; }
    .stat-card::after {
      content: ''; position: absolute; right: -15px; bottom: -15px;
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(255,255,255,.1);
    }
    .stat-card .stat-icon { font-size: 2rem; opacity: .8; }
    .stat-card .stat-number { font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-card .stat-label { font-size: .8rem; opacity: .85; margin-top: .25rem; }

    /* Badges */
    .badge-status-open { background: #dbeafe; color: #1e40af; }
    .badge-status-in_progress { background: #fef3c7; color: #92400e; }
    .badge-status-resolved { background: #d1fae5; color: #065f46; }
    .badge-status-closed { background: #f3f4f6; color: #6b7280; }
    .badge-priority-low { background: #d1fae5; color: #065f46; }
    .badge-priority-medium { background: #fef3c7; color: #92400e; }
    .badge-priority-high { background: #fee2e2; color: #991b1b; }
    .badge-priority-critical { background: #7f1d1d; color: #fff; }
    .badge-role-admin { background: #ede9fe; color: #5b21b6; }
    .badge-role-agent { background: #dbeafe; color: #1e40af; }
    .badge-role-end_user { background: #f3f4f6; color: #374151; }

    /* Tables */
    .table th { font-size: .75rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; border-top: none; }
    .table td { vertical-align: middle; font-size: .875rem; }
    .table-row-hover tbody tr:hover { background: #f9fafb; cursor: pointer; }

    /* Buttons */
    .btn-primary { background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-sm { font-size: .775rem; }

    /* Forms */
    .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 .2rem rgba(79,70,229,.15); }
    .form-label { font-weight: 500; font-size: .875rem; color: #374151; }

    /* Alert */
    .alert { border-radius: 10px; font-size: .875rem; }

    /* Responsive */
    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.show { transform: translateX(0); }
      #main-content { margin-left: 0; }
    }

    /* Priority dot */
    .priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .dot-low { background: #10b981; }
    .dot-medium { background: #f59e0b; }
    .dot-high { background: #ef4444; }
    .dot-critical { background: #7c2d12; }

    /* Empty state */
    .empty-state { text-align: center; padding: 3rem; color: #9ca3af; }
    .empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar" th:fragment="sidebar">
  <div class="sidebar-brand">
    <div style="display:flex;align-items:center;gap:.6rem;">
      <div style="width:32px;height:32px;background:#4f46e5;border-radius:8px;display:flex;align-items:center;justify-content:center;">
        <i class="fas fa-headset" style="color:#fff;font-size:.9rem;"></i>
      </div>
      <div>
        <h5 class="mb-0">HelpDesk Pro</h5>
        <small>Ticketing System</small>
      </div>
    </div>
  </div>

  <div class="sidebar-nav">
    <span class="nav-section-title">Main</span>
    <a th:href="@{/dashboard}" class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
      <i class="fas fa-tachometer-alt"></i> Dashboard
    </a>
    <a th:href="@{/tickets}" class="nav-link" th:classappend="${activePage == 'tickets'} ? 'active' : ''">
      <i class="fas fa-ticket-alt"></i> Tickets
    </a>
    <a th:href="@{/tickets/new}" class="nav-link" th:classappend="${activePage == 'new-ticket'} ? 'active' : ''">
      <i class="fas fa-plus-circle"></i> New Ticket
    </a>

    <span class="nav-section-title" sec:authorize="hasRole('ADMIN')">Administration</span>
    <a th:href="@{/admin/users}" class="nav-link" th:classappend="${activePage == 'users'} ? 'active' : ''"
       sec:authorize="hasRole('ADMIN')">
      <i class="fas fa-users"></i> Users
    </a>
    <a th:href="@{/admin/assignments}" class="nav-link" th:classappend="${activePage == 'assignments'} ? 'active' : ''"
       sec:authorize="hasRole('ADMIN')">
      <i class="fas fa-user-tag"></i> Assignments
    </a>
    <a th:href="@{/admin/resolutions}" class="nav-link" th:classappend="${activePage == 'resolutions'} ? 'active' : ''"
       sec:authorize="hasRole('ADMIN')">
      <i class="fas fa-check-circle"></i> Resolutions
    </a>

    <span class="nav-section-title" sec:authorize="hasRole('ADMIN')">System</span>
    <a href="/actuator/health" target="_blank" class="nav-link" sec:authorize="hasRole('ADMIN')">
      <i class="fas fa-heartbeat"></i> Health
    </a>
    <a href="/swagger-ui.html" target="_blank" class="nav-link" sec:authorize="hasRole('ADMIN')">
      <i class="fas fa-code"></i> API Docs
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="avatar" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</div>
      <div class="user-info">
        <div class="name" th:text="${currentUser?.name ?: #authentication.name}">User</div>
        <div class="role" th:text="${currentUser?.role}">ROLE</div>
      </div>
      <form th:action="@{/logout}" method="post" class="ms-auto">
        <button type="submit" class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:none;"
                title="Logout">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </form>
    </div>
  </div>
</nav>

</body>
</html>
