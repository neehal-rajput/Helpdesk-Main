<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Users | HelpDesk Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <th:block th:replace="~{fragments/layout :: globalStyles}"></th:block>
</head>
<body>
<div class="d-flex">
  <th:block th:replace="~{fragments/layout :: sidebar}"></th:block>
  <div id="main-content" class="flex-grow-1">
    <div class="topbar">
      <h1 class="topbar-title"><i class="fas fa-users me-2 text-primary"></i>Users</h1>
      <a th:href="@{/admin/users/new}" class="btn btn-primary btn-sm">
        <i class="fas fa-user-plus me-1"></i>Add User
      </a>
    </div>
    <div class="content-area">
      <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="fas fa-users me-2 text-primary"></i>All Users (<span th:text="${#lists.size(users)}">0</span>)</span>
          <div class="input-group input-group-sm" style="width:200px;">
            <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
            <input type="text" id="userSearch" class="form-control" placeholder="Search..."/>
          </div>
        </div>
        <div class="card-body p-0">
          <div th:if="${#lists.isEmpty(users)}" class="empty-state">
            <i class="fas fa-users"></i>
            <p>No users found</p>
            <a th:href="@{/admin/users/new}" class="btn btn-primary btn-sm">Add First User</a>
          </div>
          <div class="table-responsive" th:if="${not #lists.isEmpty(users)}">
            <table class="table table-hover mb-0" id="usersTable">
              <thead class="table-light">
                <tr>
                  <th class="ps-3">#ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Tickets</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="userRows">
                <tr th:each="user : ${users}"
                    th:data-name="${#strings.toLowerCase(user.name)}"
                    th:data-email="${#strings.toLowerCase(user.email)}">
                  <td class="ps-3 fw-600 text-primary" th:text="${user.userId}">1</td>
                  <td>
                    <div class="d-flex align-items-center gap-2">
                      <div class="avatar" style="width:32px;height:32px;font-size:.8rem;background:#e0e7ff;color:#4f46e5;"
                           th:text="${#strings.substring(user.name, 0, 1).toUpperCase()}">U</div>
                      <span class="fw-500" th:text="${user.name}">Name</span>
                    </div>
                  </td>
                  <td class="text-muted" th:text="${user.email}">email</td>
                  <td>
                    <span class="badge rounded-pill"
                          th:classappend="'badge-role-' + ${#strings.toLowerCase(user.role)}"
                          th:text="${user.role}">ROLE</span>
                  </td>
                  <td>
                    <span class="badge bg-light text-dark"
                          th:text="${user.tickets != null ? #lists.size(user.tickets) : 0}">0</span>
                  </td>
                  <td>
                    <div class="d-flex gap-1">
                      <a th:href="@{/admin/users/{id}/edit(id=${user.userId})}"
                         class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
                      <form th:action="@{/admin/users/{id}/delete(id=${user.userId})}" method="post"
                            onsubmit="return confirm('Delete user ' + this.closest('tr').querySelector('.fw-500').textContent + '?')">
                        <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                      </form>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('userSearch').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll('#userRows tr').forEach(row => {
      const name = row.dataset.name || '';
      const email = row.dataset.email || '';
      row.style.display = (name.includes(q) || email.includes(q)) ? '' : 'none';
    });
  });
  setTimeout(() => { document.querySelectorAll('.alert-dismissible').forEach(a => { try { bootstrap.Alert.getOrCreateInstance(a).close(); } catch(e){} }); }, 4000);
</script>
</body>
</html>
