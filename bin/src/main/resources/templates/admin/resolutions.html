<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Resolutions | HelpDesk Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <th:block th:replace="~{fragments/layout :: globalStyles}"></th:block>
</head>
<body>
<div class="d-flex">
  <th:block th:replace="~{fragments/layout :: sidebar}"></th:block>
  <div id="main-content" class="flex-grow-1">
    <div class="topbar">
      <h1 class="topbar-title"><i class="fas fa-check-circle me-2 text-success"></i>Resolutions</h1>
    </div>
    <div class="content-area">
      <div class="card">
        <div class="card-header" style="background:#d1fae5;color:#065f46;">
          <i class="fas fa-check-circle me-2"></i>All Resolutions (<span th:text="${#lists.size(resolutions)}">0</span>)
        </div>
        <div class="card-body p-0">
          <div th:if="${#lists.isEmpty(resolutions)}" class="empty-state">
            <i class="fas fa-check-circle text-success"></i>
            <p>No resolutions yet.</p>
          </div>
          <div class="table-responsive" th:if="${not #lists.isEmpty(resolutions)}">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th class="ps-3">#ID</th>
                  <th>Ticket</th>
                  <th>Resolved By</th>
                  <th>Resolution Notes</th>
                  <th>Resolved Date</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="r : ${resolutions}">
                  <td class="ps-3 fw-600 text-success" th:text="${r.resolutionId}">1</td>
                  <td>
                    <a th:href="@{/tickets/{id}(id=${r.ticket?.ticketId})}"
                       class="text-decoration-none fw-500"
                       th:text="${#strings.abbreviate(r.ticket?.title ?: 'N/A', 45)}">Ticket</a>
                  </td>
                  <td>
                    <div class="d-flex align-items-center gap-2">
                      <div class="avatar" style="width:28px;height:28px;font-size:.7rem;background:#d1fae5;color:#065f46;"
                           th:text="${#strings.substring(r.resolvedBy?.name ?: 'A', 0, 1).toUpperCase()}">A</div>
                      <span th:text="${r.resolvedBy?.name ?: 'N/A'}"></span>
                    </div>
                  </td>
                  <td>
                    <span th:text="${#strings.abbreviate(r.resolutionNotes ?: '', 60)}"
                          style="font-size:.875rem;color:#374151;"></span>
                  </td>
                  <td th:text="${#temporals.format(r.resolvedDate, 'dd MMM yyyy HH:mm')}">Date</td>
                  <td>
                    <a th:href="@{/tickets/{id}(id=${r.ticket?.ticketId})}"
                       class="btn btn-sm btn-outline-success">
                      <i class="fas fa-eye me-1"></i>View
                    </a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
