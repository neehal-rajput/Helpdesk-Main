<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>New Ticket | HelpDesk Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <th:block th:replace="~{fragments/layout :: globalStyles}"></th:block>
</head>
<body>
<div class="d-flex">
  <th:block th:replace="~{fragments/layout :: sidebar}"></th:block>
  <div id="main-content" class="flex-grow-1">
    <div class="topbar">
      <h1 class="topbar-title"><i class="fas fa-plus-circle me-2 text-primary"></i>New Ticket</h1>
      <a th:href="@{/tickets}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i>Back
      </a>
    </div>
    <div class="content-area">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-header">
              <i class="fas fa-ticket-alt me-2 text-primary"></i>Submit New Support Ticket
            </div>
            <div class="card-body p-4">
              <form th:action="@{/tickets/save}" method="post">
                <div class="mb-3">
                  <label class="form-label">Title <span class="text-danger">*</span></label>
                  <input type="text" name="title" class="form-control"
                         placeholder="Brief summary of the issue" required maxlength="200"/>
                </div>
                <div class="mb-3">
                  <label class="form-label">Description <span class="text-danger">*</span></label>
                  <textarea name="description" class="form-control" rows="5"
                            placeholder="Describe your issue in detail..." required></textarea>
                </div>
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Priority <span class="text-danger">*</span></label>
                    <select name="priority" class="form-select" required>
                      <option value="">-- Select Priority --</option>
                      <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
                    </select>
                  </div>
                  <div class="col-md-6 mb-3" th:if="${isAdmin}">
                    <label class="form-label">Submit On Behalf Of</label>
                    <select name="userId" class="form-select">
                      <option value="">-- Select User --</option>
                      <option th:each="u : ${users}" th:value="${u.userId}" th:text="${u.name + ' (' + u.email + ')'}"></option>
                    </select>
                  </div>
                  <input th:unless="${isAdmin}" type="hidden" name="userId" th:value="${currentUser?.userId}"/>
                </div>
                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary px-4">
                    <i class="fas fa-paper-plane me-2"></i>Submit Ticket
                  </button>
                  <a th:href="@{/tickets}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
              </form>
            </div>
          </div>

          <!-- Priority Guide -->
          <div class="card mt-3">
            <div class="card-header"><i class="fas fa-info-circle me-2 text-info"></i>Priority Guide</div>
            <div class="card-body">
              <div class="row g-2">
                <div class="col-6 col-md-3">
                  <div class="p-2 rounded text-center" style="background:#d1fae5;">
                    <span class="fw-600 small" style="color:#065f46;">LOW</span>
                    <p class="mb-0 text-muted" style="font-size:.7rem;">Minor issues, no impact</p>
                  </div>
                </div>
                <div class="col-6 col-md-3">
                  <div class="p-2 rounded text-center" style="background:#fef3c7;">
                    <span class="fw-600 small" style="color:#92400e;">MEDIUM</span>
                    <p class="mb-0 text-muted" style="font-size:.7rem;">Moderate impact</p>
                  </div>
                </div>
                <div class="col-6 col-md-3">
                  <div class="p-2 rounded text-center" style="background:#fee2e2;">
                    <span class="fw-600 small" style="color:#991b1b;">HIGH</span>
                    <p class="mb-0 text-muted" style="font-size:.7rem;">Significant disruption</p>
                  </div>
                </div>
                <div class="col-6 col-md-3">
                  <div class="p-2 rounded text-center" style="background:#7f1d1d;">
                    <span class="fw-600 small" style="color:#fff;">CRITICAL</span>
                    <p class="mb-0" style="font-size:.7rem;color:rgba(255,255,255,.8);">System-wide outage</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
